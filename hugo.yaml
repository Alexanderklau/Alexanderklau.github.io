baseURL: "https://yemilice.com/"
title: "yemilice"
theme: "PaperMod"
defaultContentLanguage: "zh-cn"
languageCode: "zh-cn"
hasCJKLanguage: true

pagination:
  pagerSize: 10

enableRobotsTXT: true
buildDrafts: false
buildFuture: false
buildExpired: false

outputs:
  home:
    - HTML
    - RSS
    - JSON

params:
  env: production
  title: "yemilice"
  description: "程序、音乐与生活随笔"
  mainSections:
    - posts
  defaultTheme: auto
  ShowReadingTime: true
  ShowShareButtons: false
  ShowPostNavLinks: true
  ShowBreadCrumbs: true
  ShowCodeCopyButtons: true
  ShowWordCount: true
  ShowRssButtonInSectionTermList: true
  ShowToc: true
  TocOpen: false

  homeInfoParams:
    Title: "Yemilice"
    Content: |
      人生如逆水行舟，不进则退。

      这里主要记录 **Golang / 架构 / 搜索/ AI / 游戏相关**，偶尔也写音乐、成长和一些不太想发在朋友圈的话。
    Buttons:
      - name: 归档
        url: /archives/
      - name: 关于我
        url: /aboutme/

  contentTracks:
    - title: 技术沉淀
      description: Golang、架构设计、ElasticSearch、分布式和踩坑复盘。
      url: /categories/技术/
    - title: 游戏观察
      description: 多人游戏、网络机制、匹配逻辑，以及一些开发者视角的拆解。
      url: /posts/%E5%A4%9A%E4%BA%BA%E6%B8%B8%E6%88%8F%E6%8A%80%E6%9C%AF%E5%9F%BA%E7%A1%80/
    - title: 音乐与生活
      description: 说唱、编曲、情绪记录，还有那些不太适合发在朋友圈的话。
      url: /categories/生活/

  featuredPosts:
    - title: Golang协程基础探究
      url: /posts/golang%E5%8D%8F%E7%A8%8B%E5%9F%BA%E7%A1%80%E6%8E%A2%E7%A9%B6/
      tag: 系列起点
    - title: 多人游戏技术基础
