<script>
    
    function getCurrentPageKey() {
        return 'waline_page_' + window.location.pathname;
    }

    
    function getOrCreateVisitorId() {
        let visitorId = localStorage.getItem('waline_visitor_id');
        if (!visitorId) {
            visitorId = 'visitor_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
            localStorage.setItem('waline_visitor_id', visitorId);
        }
        return visitorId;
    }

    
    function updatePVUV() {
        const pageKey = getCurrentPageKey();
        const visitorId = getOrCreateVisitorId();

        
        let pageData = JSON.parse(localStorage.getItem(pageKey) || '{"pv": 0, "visitors": []}');

        
        pageData.pv = (pageData.pv || 0) + 1;

        
        if (!pageData.visitors) {
            pageData.visitors = [];
        }
        if (!pageData.visitors.includes(visitorId)) {
            pageData.visitors.push(visitorId);
        }

        
        localStorage.setItem(pageKey, JSON.stringify(pageData));

        
        const pv = pageData.pv;
        const uv = pageData.visitors.length;

        const pvElement = document.getElementById('waline-pv');
        const uvElement = document.getElementById('waline-uv');

        if (pvElement) {
            pvElement.innerHTML = `PV: <strong>${pv}</strong>`;
        }
        if (uvElement) {
            uvElement.innerHTML = `UV: <strong>${uv}</strong>`;
        }
    }

    
    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', updatePVUV);
    } else {
        updatePVUV();
    }
</script>
