{{- /* Head custom content area - Waline comments */ -}}
<link rel="stylesheet" href="https://unpkg.com/@waline/client@v3/dist/waline.css" />

{{- /* Custom styles for first-entry home-info width */ -}}
<style>
    .main {
        gap: 1.25rem;
    }

    .first-entry.home-info {
        max-width: 860px;
        margin-left: auto;
        margin-right: auto;
        padding: 2rem;
        background:
            radial-gradient(circle at top right, rgba(120, 119, 198, 0.10), transparent 30%),
            linear-gradient(180deg, rgba(255, 255, 255, 0.02), transparent);
        border: 1px solid var(--border);
        border-radius: calc(var(--radius) + 8px);
    }

    .home-info .entry-header h1 {
        font-size: clamp(2.2rem, 5vw, 3.4rem);
        letter-spacing: -0.03em;
    }

    .home-info .entry-content {
        margin-top: 0.5rem;
        color: var(--secondary);
        font-size: 1rem;
        line-height: 1.9;
    }

    .home-info .entry-content p {
        margin: 0 0 0.9rem;
    }

    .home-actions {
        display: flex;
        flex-wrap: wrap;
        gap: 0.75rem;
        margin-top: 1.5rem;
    }

    .home-action {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-width: 6.5rem;
        padding: 0.72rem 1rem;
        border: 1px solid var(--border);
        border-radius: 999px;
        background: var(--theme);
        color: var(--primary);
        text-decoration: none;
        transition: transform 0.16s ease, border-color 0.16s ease, background-color 0.16s ease;
    }

    .home-action:hover {
        transform: translateY(-1px);
        border-color: var(--primary);
    }

    .home-info .entry-footer {
        margin-top: 1.25rem;
    }

    .home-section {
        margin: 0 0 2rem;
    }

    .section-heading {
        margin: 0 auto 1rem;
        max-width: 860px;
    }

    .section-heading h2 {
        margin: 0;
        font-size: 1.5rem;
        letter-spacing: -0.02em;
    }

    .section-heading p {
        margin: 0.45rem 0 0;
        color: var(--secondary);
    }

    .home-grid {
        display: grid;
        gap: 1rem;
    }

    .track-grid {
        grid-template-columns: repeat(3, minmax(0, 1fr));
    }

    .featured-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
    }

    .home-card {
        display: block;
        padding: 1.2rem;
        background: var(--entry);
        border: 1px solid var(--border);
        border-radius: calc(var(--radius) + 4px);
        text-decoration: none;
        color: inherit;
        transition: transform 0.16s ease, border-color 0.16s ease, box-shadow 0.16s ease;
    }

    .home-card:hover {
        transform: translateY(-2px);
        border-color: var(--secondary);
        box-shadow: 0 12px 30px rgba(0, 0, 0, 0.08);
    }

    .home-card-kicker,
    .home-card-tag,
    .home-card-date {
        display: inline-flex;
        align-items: center;
        font-size: 12px;
    }

    .home-card-kicker,
    .home-card-tag {
        padding: 0.22rem 0.5rem;
        border-radius: 999px;
        background: var(--code-bg);
        color: var(--secondary);
    }

    .home-card h3 {
        margin: 0.8rem 0 0.55rem;
        font-size: 1.15rem;
        line-height: 1.5;
    }

    .home-card h3 a {
        color: inherit;
        text-decoration: none;
    }

    .home-card p {
        margin: 0;
        color: var(--secondary);
        line-height: 1.75;
    }

    .home-card-topline {
        display: flex;
        justify-content: space-between;
        gap: 0.75rem;
        color: var(--secondary);
    }

    .home-card-meta {
        margin-top: 0.9rem;
        color: var(--secondary);
        font-size: 13px;
    }

    .featured-card {
        padding: 1rem 1rem 0.95rem;
    }

    .featured-card h3 {
        margin: 0.65rem 0 0.45rem;
        font-size: 1.02rem;
        line-height: 1.45;
    }

    .featured-card p {
        display: -webkit-box;
        overflow: hidden;
        -webkit-box-orient: vertical;
        -webkit-line-clamp: 3;
        font-size: 13.5px;
        line-height: 1.65;
    }

    .featured-card .home-card-meta {
        margin-top: 0.7rem;
        font-size: 12px;
    }

    .home-latest {
        margin-top: 2rem;
    }

    .latest-entry {
        padding: 1rem 1.1rem;
    }

    .latest-topline {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 0.75rem;
        margin-bottom: 0.55rem;
        color: var(--secondary);
        font-size: 12px;
    }

    .latest-tag {
        display: inline-flex;
        align-items: center;
        padding: 0.2rem 0.48rem;
        border-radius: 999px;
        background: var(--code-bg);
        color: var(--secondary);
    }

    .latest-date {
        white-space: nowrap;
    }

    .latest-entry .entry-header h2 {
        font-size: 1.08rem;
        line-height: 1.45;
    }

    .latest-entry .entry-content {
        display: -webkit-box;
        overflow: hidden;
        -webkit-box-orient: vertical;
        -webkit-line-clamp: 2;
        margin-top: 0.35rem;
        font-size: 13.5px;
        line-height: 1.65;
    }

    .latest-entry .entry-footer {
        margin-top: 0.55rem;
        font-size: 12px;
    }

    .social-icons a {
        transition: transform 0.16s ease, opacity 0.16s ease;
    }

    .social-icons a:hover {
        transform: translateY(-2px);
        opacity: 0.9;
    }

    .post-entry {
        transition: transform 0.16s ease, border-color 0.16s ease, box-shadow 0.16s ease;
    }

    .post-entry:hover {
        transform: translateY(-2px);
        border-color: var(--secondary);
        box-shadow: 0 12px 30px rgba(0, 0, 0, 0.08);
    }

    .entry-header h2 {
        line-height: 1.4;
    }

    .entry-content {
        -webkit-line-clamp: 3;
        font-size: 14.5px;
        line-height: 1.75;
    }

    .post-content,
    .post-single .post-header,
    .post-single .post-footer {
        max-width: 860px;
        margin-left: auto;
        margin-right: auto;
    }

    .post-content img,
    .post-content video,
    .post-content audio {
        display: block;
        max-width: 100%;
        margin-left: auto;
        margin-right: auto;
    }

    .post-content img {
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
    }

    .post-content blockquote {
        background: var(--code-bg);
        padding: 1rem 1rem 1rem 1.1rem;
        border-radius: var(--radius);
        border-inline-start-width: 0.25rem;
    }

    .post-content pre {
        border-radius: var(--radius);
    }

    @media (max-width: 768px) {
        .first-entry.home-info {
            padding: 1.4rem;
        }

        .track-grid,
        .featured-grid {
            grid-template-columns: 1fr;
        }

        .latest-topline {
            align-items: flex-start;
            flex-direction: column;
            gap: 0.35rem;
        }

        .home-actions {
            gap: 0.6rem;
        }

        .home-action {
            width: 100%;
        }
    }
</style>
