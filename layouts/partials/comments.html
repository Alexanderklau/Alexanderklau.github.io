{{- /* Waline comments system */ -}}
{{- if site.Params.waline.enable }}
<div id="vcomments-box">
    <div class="comment-tip" style="padding: 10px 0; color: #999; font-size: 14px;">
        💬 欢迎留言！可以匿名评论，邮箱和网站为可选项。
    </div>
    <div id="vcomments"></div>
</div>

<script type="module">
    import { init } from 'https://unpkg.com/@waline/client@v3/dist/waline.js';

    function initWalineComments() {
        try {
            init({
                el: '#vcomments',
                serverURL: '{{ site.Params.waline.serverURL }}',
                path: window.location.pathname,
                lang: 'zh-CN',
                locale: {
                    nick: '昵称',
                    mail: '邮箱',
                    link: '网站'
                },
                meta: ['nick', 'mail', 'link'],
                requiredMeta: [],
                reaction: false,
                dark: 'html[data-theme="dark"]'
            });
        } catch (error) {
            console.error('Waline initialization error:', error);
        }
    }

    // Wait until the page is ready before mounting Waline.
    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', initWalineComments);
    } else {
        initWalineComments();
    }
</script>
{{- end }}
